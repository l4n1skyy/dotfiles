# ~/.config/hypr/hyprlock.conf

# ==========================================
# Background: Limine Charcoal
# ==========================================
background {
    monitor =
    color = rgb(24, 25, 26) 
}

# ==========================================
# Logo: Omarchy PNG (Massive Scale)
# ==========================================
image {
    monitor =
    path = /home/l4n1skyy/.config/hypr/omarchy-logo.png
    size = 900
    rounding = 0          
    border_size = 0
    position = 0, 150
    halign = center
    valign = center
}

# ==========================================
# Terminal Prompt Label (Aligned with Box)
# ==========================================
label {
    monitor =
    width = 300
    text = <span foreground="##9ece6a">l4n1skyy</span>@<span foreground="##9ece6a">omarchy</span>:~$ sudo unlock
    font_family = JetBrainsMono Nerd Font
    font_size = 12
    color = rgb(255, 255, 255)
    
    # Positioned with a bit of space above the box
    position = 0, -5 
    halign = center
    valign = center
    text_align = left
}

# ==========================================
# Input Field: 1px White Border Terminal Box
# ==========================================
input-field {
    monitor =
    size = 300, 40
    outline_thickness = 1
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    
    dots_rounding = -1    
    rounding = 0          
    
    outer_color = rgb(255, 255, 255)
    inner_color = rgb(24, 25, 26) 
    font_color = rgb(255, 255, 255)
    
    check_color = rgb(158, 206, 106)
    fail_color = rgb(247, 118, 142)
    
    fade_on_empty = false
    placeholder_text = <span font_family="JetBrainsMono Nerd Font" foreground="white">password </span>
    hide_input = false
    
    # Lowered slightly to create clear vertical spacing
    position = 0, -45
    halign = center
    valign = center
}

# ==========================================
# Bootloader-Style Kernel Clock (12h Syntax)
# ==========================================
label {
    monitor =
    # Removed seconds as requested
    text = cmd[update:1000] echo "<span foreground='white'>[</span> $(date +'%I:%M %p') <span foreground='white'>]</span> omarchy kernel: system locked."
    font_family = JetBrainsMono Nerd Font
    font_size = 11
    color = rgb(151, 151, 151)
    
    # Pushed further down to separate from the input area
    position = 0, -140
    halign = center
    valign = center
}
